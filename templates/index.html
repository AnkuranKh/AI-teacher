<!DOCTYPE html>
<html>
<head>
    <title>AI Learning Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>🧠 Conversational Retrieval System</h1>

        <!-- 🔼 UPLOAD SECTION -->
        <div class="top-section">
            <div class="input-section">

                <div class="upload-box">
                    <h3>📁 Upload Video</h3>
                    <input type="file" id="videoFile">
                    <button onclick="upload()">Upload & Process</button>
                </div>

                <div class="divider">OR</div>

                <div class="youtube-box">
                    <h3>🔗 YouTube Link</h3>
                    <input type="text" id="youtubeUrl" placeholder="Paste YouTube URL here...">
                    <button onclick="uploadYouTube()">Process</button>
                </div>

            </div>
        </div>

        <!-- 🎥 VIDEO PLAYER -->
<div class="video-container">

    <!-- Normal uploaded video -->
    <video id="videoPlayer" controls></video>

    <!-- YouTube player -->
    <div
        id="youtubeContainer"
        style="display:none;">

        <iframe
    id="youtubePlayer"
    width="100%"
    height="300"
    style="border:none;"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
</iframe>

    </div>

</div>
        
        <!-- 💬 CHAT -->
        <div id="chatBox" class="chat-box"></div>

        <!-- 🧠 INPUT -->
        <div class="input-bar">
            <input type="text" id="query" placeholder="Ask about the video...">
            <button onclick="ask()">Ask</button>
        </div>

        <!-- ⚡ ACTIONS -->
        <div class="actions">

    <button onclick="getSummary()">
        📖 Summary
    </button>

    <button onclick="getQuiz('easy')">
        🟢 Easy Quiz
    </button>

    <button onclick="getQuiz('medium')">
        🟡 Medium Quiz
    </button>

    <button onclick="getQuiz('hard')">
        🔴 Hard Quiz
    </button>

</div>

        <!-- ⏳ LOADER -->
        <div id="loader" style="display:none; text-align:center;">
            <div class="spinner"></div>
            <p id="progressText">Processing...</p>

            <div id="progressContainer" style="display:none;">
                <div class="progress-bg">
                    <div id="progressBar" class="progress-bar">0%</div>
                </div>
                <p id="progressStatus">Starting...</p>
            </div>
        </div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
